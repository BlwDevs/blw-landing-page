<svg width="120" height="40" viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d80f2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="20" cy="20" r="18" fill="url(#logoGradient)" />
  
  <!-- BLW letters in modern style -->
  <text x="50" y="28" font-family="Inter, sans-serif" font-size="24" font-weight="900" fill="#0d80f2">BLW</text>
  
  <!-- Geometric elements for tech feel -->
  <rect x="12" y="12" width="4" height="4" fill="white" opacity="0.9" />
  <rect x="20" y="8" width="4" height="4" fill="white" opacity="0.7" />
  <rect x="28" y="12" width="4" height="4" fill="white" opacity="0.9" />
  
  <!-- Subtitle -->
  <text x="50" y="36" font-family="Inter, sans-serif" font-size="8" font-weight="500" fill="#6c757d">SOFTWARE</text>
</svg>